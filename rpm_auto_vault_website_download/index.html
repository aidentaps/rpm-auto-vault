<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>RPM Auto Vault</title>
<style>
body{font-family:Arial;background:#0c0c0c;color:white;margin:0}
header{background:#111;padding:20px}
.container{max-width:1100px;margin:auto;padding:20px}
.hero{padding:60px 20px;background:#111}
.kicker{color:#e0b84f;font-weight:bold}
.section{padding:40px 20px}
img{max-width:100%;border-radius:10px}
a.btn{background:#e0b84f;color:black;padding:10px 18px;border-radius:6px;text-decoration:none;font-weight:bold}
</style>
</head>

<body>

<header>
<div class="container">
<h2 id="businessName">RPM Auto Vault</h2>
<p id="tagline">Secure indoor car storage</p>
</div>
</header>

<div class="hero">
<div class="container">
<div class="kicker" id="availability">Spots available</div>
<h1 id="headline">Climate‑controlled vehicle storage</h1>
<p id="subheadline">Secure indoor storage with 24/7 monitoring and easy access.</p>
</div>
</div>

<div class="section">
<div class="container">
<h2>Location</h2>
<p id="address">1120 US 22 Lebanon NJ</p>
</div>
</div>

<div class="section">
<div class="container">
<h2>Contact</h2>
<p>Email: <span id="email"></span></p>
<p><a id="igLink" class="btn" target="_blank">DM on Instagram</a></p>
</div>
</div>

<script>
async function loadData(){
 try{
  let site = await fetch('/content/site.json').then(r=>r.json());
  let home = await fetch('/content/home.json').then(r=>r.json());
  let contact = await fetch('/content/contact.json').then(r=>r.json());

  document.getElementById("businessName").textContent=site.business_name
  document.getElementById("tagline").textContent=site.tagline
  document.getElementById("headline").textContent=home.hero_headline
  document.getElementById("subheadline").textContent=home.hero_subheadline
  document.getElementById("availability").textContent = home.available ? "Spots available" : "Currently full"
  document.getElementById("address").textContent=site.address
  document.getElementById("email").textContent=contact.email
  document.getElementById("igLink").href=contact.instagram
 }catch(e){}
}
loadData()
</script>

</body>
</html>
