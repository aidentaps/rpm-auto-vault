
backend:
  name: git-gateway
  branch: main

media_folder: "media/uploads"
public_folder: "/media/uploads"

collections:
  - name: "site"
    label: "Site Info"
    files:
      - file: "content/site.json"
        label: "Business Info"
        name: "site"
        fields:
          - {label: "Business Name", name: "business_name", widget: "string"}
          - {label: "Tagline", name: "tagline", widget: "string"}
          - {label: "Address", name: "address", widget: "string"}

  - name: "home"
    label: "Homepage"
    files:
      - file: "content/home.json"
        label: "Hero"
        name: "home"
        fields:
          - {label: "Spots Available", name: "available", widget: "boolean"}
          - {label: "Headline", name: "hero_headline", widget: "string"}
          - {label: "Subheadline", name: "hero_subheadline", widget: "text"}

  - name: "contact"
    label: "Contact"
    files:
      - file: "content/contact.json"
        label: "Contact Info"
        name: "contact"
        fields:
          - {label: "Email", name: "email", widget: "string"}
          - {label: "Instagram URL", name: "instagram", widget: "string"}
