backend:
  name: git-gateway
  branch: main

media_folder: "media/uploads"
public_folder: "/media/uploads"

publish_mode: editorial_workflow

collections:
  - name: "dashboard"
    label: "RPM Auto Vault Editor"
    files:
      - file: "content/homepage.json"
        label: "Homepage"
        name: "homepage"
        fields:
          - { label: "Main headline", name: "headline", widget: "string" }
          - { label: "Subheadline", name: "subheadline", widget: "text" }
          - label: "Feature bullets"
            name: "feature_bullets"
            widget: "list"
            field: { label: "Bullet", name: "bullet", widget: "string" }

      - file: "content/hero-image.json"
        label: "Hero image"
        name: "hero_image"
        fields:
          - { label: "Top image", name: "hero_image", widget: "image" }
          - { label: "Alt text", name: "hero_image_alt", widget: "string" }
          - { label: "Short caption", name: "hero_caption", widget: "string" }

      - file: "content/gallery-images.json"
        label: "Gallery images"
        name: "gallery_images"
        fields:
          - label: "Gallery photos"
            name: "images"
            widget: "list"
            field: { label: "Image", name: "image", widget: "image" }

      - file: "content/location.json"
        label: "Location"
        name: "location"
        fields:
          - { label: "Section heading", name: "heading", widget: "string" }
          - { label: "Directions text", name: "directions_text", widget: "text" }

      - file: "content/site-settings.json"
        label: "Contact info"
        name: "site_settings"
        fields:
          - { label: "Business name", name: "business_name", widget: "string" }
          - { label: "Tagline", name: "tagline", widget: "string" }
          - { label: "Meta description", name: "meta_description", widget: "text" }
          - { label: "Instagram URL", name: "instagram_url", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Phone", name: "phone", widget: "string", required: false }
          - { label: "Address", name: "address", widget: "string" }
          - { label: "Google Maps URL", name: "maps_url", widget: "string" }

      - file: "content/availability.json"
        label: "Availability"
        name: "availability"
        fields:
          - { label: "Show availability badge", name: "show_badge", widget: "boolean", default: true }
          - { label: "Badge text", name: "badge_text", widget: "string" }

      - file: "content/contact-info.json"
        label: "Booking text"
        name: "contact_info"
        fields:
          - { label: "Booking message", name: "booking_text", widget: "text" }
